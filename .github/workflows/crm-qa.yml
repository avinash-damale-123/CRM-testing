name: Retail CRM QA Tests

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout test repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run CRM QA tests
        run: npx playwright test
        env:
          CRM_URL: ${{ secrets.CRM_URL }}
          CRM_EMAIL: ${{ secrets.CRM_EMAIL }}
          CRM_PASSWORD: ${{ secrets.CRM_PASSWORD }}

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crm-playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload screenshots and test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crm-test-results
          path: test-results/
          retention-days: 7
